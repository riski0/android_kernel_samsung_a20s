name: Samsung A20s (Qualcomm SDM450) Non-GKI KernelSU-Next + SUSFS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # =========================
    # Checkout
    # =========================
    - name: Checkout kernel source
      uses: actions/checkout@v4

    # =========================
    # Dependencies
    # =========================
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc bison flex git make ccache \
          libssl-dev libelf-dev \
          python3 python-is-python3 \
          clang lld \
          device-tree-compiler \
          lz4 gzip zip unzip

    # =========================
    # Environment
    # =========================
    - name: Export environment variables
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV
        echo "CC=clang" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV

    # =========================
    # Defconfig
    # =========================
    - name: Load defconfig (A20s SDM450)
      run: |
        make a20s_eur_open_defconfig

    # =========================
    # Build Kernel + DTB
    # =========================
    - name: Build kernel Image & DTB
      run: |
        make -j$(nproc) Image dtbs

    # =========================
    # Compress Image
    # =========================
    - name: Compress kernel Image (gzip + lz4)
      run: |
        cd arch/arm64/boot
        gzip -fk Image
        lz4 -f Image Image.lz4

    # =========================
    # DTB FIX (Qualcomm)
    # =========================
    - name: Create unified dtb (Qualcomm SDM450)
      run: |
        mkdir -p out
        cat arch/arm64/boot/dts/qcom/*.dtb > out/dtb

        if [ ! -s out/dtb ]; then
          echo "❌ DTB not generated!"
          exit 1
        fi

    # =========================
    # AnyKernel3
    # =========================
    - name: Clone AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

    - name: Copy kernel + dtb to AnyKernel3
      run: |
        # Samsung Qualcomm NON-GKI → Image.gz
        cp arch/arm64/boot/Image.gz AnyKernel3/zImage
        cp out/dtb AnyKernel3/dtb

    # ===========
