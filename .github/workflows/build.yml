name: Build Non-GKI Kernel + KernelSU-Next + SUSFS (boot.img)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # =========================
    # Checkout
    # =========================
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # =========================
    # Dependencies
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc bison flex git make ccache \
          libssl-dev libelf-dev \
          python3 python-is-python3 \
          clang lld \
          device-tree-compiler \
          unzip

    # =========================
    # Build Environment
    # =========================
    - name: Export build variables
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV
        echo "CC=clang" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV

    # =========================
    # Defconfig
    # =========================
    - name: Kernel defconfig
      run: |
        make a20s_eur_open_defconfig

    # =========================
    # Build Kernel + DTB
    # =========================
    - name: Build kernel Image & DTB
      run: |
        make -j$(nproc) Image dtbs

    # =========================
    # Prepare AnyKernel3
    # =========================
    - name: Clone AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

    - name: Copy Image & DTB
      run: |
        cp arch/arm64/boot/Image AnyKernel3/

        # gabungkan semua dtb (Samsung non-GKI)
        cat arch/arm64/boot/dts/exynos/*.dtb > AnyKernel3/dtb

    # =========================
    # AnyKernel3 Config
    # =========================
    - name: Patch anykernel.sh
      run: |
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's/do.modules=0/do.modules=0/g' AnyKernel3/anykernel.sh
        sed -i 's/do.cleanup=1/do.cleanup=1/g' AnyKernel3/anykernel.sh

    # =========================
    # Pack boot.img
    # =========================
    - name: Build boot.img
      run: |
        cd AnyKernel3
        zip -r9 kernel.zip ./*
        mv kernel.zip ../boot.img

    # =========================
    # Upload
    # =========================
    - name: Upload boot.img
      uses: actions/upload-artifact@v4
      with:
        name: boot-img
        path: boot.img
