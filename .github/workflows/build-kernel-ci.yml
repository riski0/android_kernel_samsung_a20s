name: Build Android Kernel CI

on:
  push:
    branches:
      - testing/enable-kernelsu-manager
  pull_request:
    branches:
      - testing/enable-kernelsu-manager
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            libncurses-dev \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            python3 \
            python3-dev \
            zip \
            unzip
      
      - name: Configure kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make O=out ARCH=arm64 a20s_eur_open_defconfig
      
      - name: Build kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) O=out ARCH=arm64
      
      - name: Build device tree blobs
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) O=out ARCH=arm64 dtbs
      
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          
          # Copy kernel image
          if [ -f out/arch/arm64/boot/Image ]; then
            cp out/arch/arm64/boot/Image artifacts/
          fi
          
          if [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz artifacts/
          fi
          
          # Copy device tree blobs
          if [ -d out/arch/arm64/boot/dts ]; then
            find out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} artifacts/ \;
          fi
          
          # List artifacts
          ls -lah artifacts/
      
      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-artifacts
          path: artifacts/
          if-no-files-found: error
