# Template workflow: sesuaikan TOOLCHAIN URLs, DEFCONFIG, dan repos KernelSU/SUSFS
# Replace placeholders in UPPERCASE before using.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      DEFCONFIG: YOUR_DEFCONFIG_HERE        # contoh: lineage_defconfig atau vendor_a20s_defconfig
      OUTPUT_DIR: out
      KERNEL_IMG_NAME: Image.gz-dtb        # ubah jika kernelmu memakai Image, Image.gz, dtb, dll
      TOOLCHAIN_DIR: toolchains
      CLANG_URL: https://github.com/LINE/PROTON-CLANG-RELEASE.tar.xz   # ganti dengan URL nyata proton-clang
      GCC_AARCH64_URL: https://example.com/gcc-aarch64.tar.xz         # ganti dengan URL nyata
      KERNELSU_REPO: https://github.com/OWNER/KernelSU.git            # ganti dengan repo KernelSU
      SUSFS_REPO: https://github.com/OWNER/susfs.git                  # ganti atau hapus jika tidak perlu
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup toolchains
      run: |
        set -ex
        mkdir -p ${{ env.TOOLCHAIN_DIR }}
        cd ${{ env.TOOLCHAIN_DIR }}
        # ----- Clang (proton-clang / other) -----
        if [ ! -d proton-clang ]; then
          curl -L -o clang.tar.xz "${{ env.CLANG_URL }}"
          mkdir -p proton-clang
          tar -xf clang.tar.xz -C proton-clang --strip-components=1
        fi
        # ----- GCC aarch64 for cross-ld (if needed) -----
        if [ ! -d gcc-aarch64 ]; then
          curl -L -o gcc.tar.xz "${{ env.GCC_AARCH64_URL }}"
          mkdir -p gcc-aarch64
          tar -xf gcc.tar.xz -C gcc-aarch64 --strip-components=1
        fi
        echo "Toolchains ready"

    - name: Export toolchain PATH
      run: |
        echo "::add-path::${{ runner.workspace }}/${{ env.TOOLCHAIN_DIR }}/proton-clang/bin"
        echo "::add-path::${{ runner.workspace }}/${{ env.TOOLCHAIN_DIR }}/gcc-aarch64/bin"
      # NOTE: add-path is deprecated in some runners; subsequent shell steps will set PATH explicitly.

    - name: Prepare build environment
      shell: bash
      run: |
        set -ex
        export PATH="${{ github.workspace }}/${{ env.TOOLCHAIN_DIR }}/proton-clang/bin:${{ github.workspace }}/${{ env.TOOLCHAIN_DIR }}/gcc-aarch64/bin:$PATH"
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export ARCH=${{ env.ARCH }}
        mkdir -p ${{ env.OUTPUT_DIR }}
        # Make defconfig
        make O=${{ env.OUTPUT_DIR }} ARCH=${{ env.ARCH }} ${DEFCONFIG}

    - name: Add kernel config fragment for KernelSU / susfs
      shell: bash
      run: |
        set -ex
        # Create a fragment with required config options.
        # EDIT the options below to match what KernelSU/susfs require.
        cat > kernel-fragment.cfg <<'EOF'
        # Example: enable modules and any KernelSU-specific options
        CONFIG_MODULES=y
        # CONFIG_KERNELSU=m   # <-- uncomment or set to 'y' if KernelSU needs in-tree
        # CONFIG_SUSFS=y      # <-- replace with actual config option names if available
        EOF

        # Merge fragment into the current .config (requires merge_config.sh in scripts/kconfig)
        if [ -f scripts/kconfig/merge_config.sh ]; then
          scripts/kconfig/merge_config.sh ${OUTPUT_DIR}/.config kernel-fragment.cfg
        else
          echo "merge_config.sh not found; appending fragment to .config"
          cat kernel-fragment.cfg >> ${OUTPUT_DIR}/.config
        fi

    - name: Verify .config
      shell: bash
      run: |
        set -ex
        export ARCH=${{ env.ARCH }}
        # Ensure config is updated
        make O=${{ env.OUTPUT_DIR }} ARCH=${{ env.ARCH }} olddefconfig

    - name: Build kernel and modules
      shell: bash
      run: |
        set -ex
        export PATH="${{ github.workspace }}/${{ env.TOOLCHAIN_DIR }}/proton-clang/bin:${{ github.workspace }}/${{ env.TOOLCHAIN_DIR }}/gcc-aarch64/bin:$PATH"
        export ARCH=${{ env.ARCH }}
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        make -j$(nproc) O=${{ env.OUTPUT_DIR }} ARCH=${{ env.ARCH }} ${KERNEL_IMG_NAME}
        make -j$(nproc) O=${{ env.OUTPUT_DIR }} ARCH=${{ env.ARCH }} modules
        # collect modules
        mkdir -p release/modules
        (cd ${OUTPUT_DIR} && find . -name '*.ko' -print0 | xargs -0 -I{} cp --parents {} ../release/modules/)

    - name: Build KernelSU (external module)
      if: ${{ env.KERNELSU_REPO != '' }}
      shell: bash
      run: |
        set -ex
        export ARCH=${{ env.ARCH }}
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        git clone --depth 1 "${{ env.KERNELSU_REPO }}" kernelsu
        # Adjust build commands according to KernelSU repo. Example:
        cd kernelsu
        # If KernelSU uses an out-of-tree build:
        make -C "${{ github.workspace }}/${{ env.OUTPUT_DIR }}" M=$PWD O=${{ env.OUTPUT_DIR }} ARCH=${{ env.ARCH }} \
          CROSS_COMPILE=${CROSS_COMPILE} CC=${CC} -j$(nproc)
        # Copy produced .ko to release
        mkdir -p ../release/kernelsu
        find . -name '*.ko' -exec cp --parents {} ../release/kernelsu/ \;

    - name: Build susfs (external module)
      if: ${{ env.SUSFS_REPO != '' }}
      shell: bash
      run: |
        set -ex
        export ARCH=${{ env.ARCH }}
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        git clone --depth 1 "${{ env.SUSFS_REPO }}" susfs
        cd susfs
        # Adjust build commands according to susfs repo
        make -C "${{ github.workspace }}/${{ env.OUTPUT_DIR }}" M=$PWD O=${{ env.OUTPUT_DIR }} ARCH=${{ env.ARCH }} \
          CROSS_COMPILE=${CROSS_COMPILE} CC=${CC} -j$(nproc)
        mkdir -p ../release/susfs
        find . -name '*.ko' -exec cp --parents {} ../release/susfs/ \;

    - name: Package artifacts
      shell: bash
      run: |
        set -ex
        mkdir -p release/kernel
        # copy kernel image and dtbs
        cp -v ${OUTPUT_DIR}/${KERNEL_IMG_NAME} release/kernel/ || true
        # copy dtb/dtb.img jika ada
        cp -v ${OUTPUT_DIR}/arch/arm64/boot/dts/*/*.dtb release/kernel/ || true
        # zip everything
        zip -r kernel-release.zip release || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-release
        path: kernel-release.zip